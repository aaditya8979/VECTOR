name: VECTOR CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          pip install tree-sitter tree-sitter-python tree-sitter-javascript \
                      tree-sitter-typescript tree-sitter-go tree-sitter-rust \
                      tree-sitter-cpp networkx tiktoken rich click pytest \
                      pytest-cov hypothesis
      
      - name: Run tests (skip model/ollama-dependent and slow tests)
        run: |
          python -m pytest tests/ \
            -m "not requires_model and not requires_ollama and not slow" \
            --cov=core --cov=verification \
            --cov-report=term-missing \
            --cov-report=xml \
            -v
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
